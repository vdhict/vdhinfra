# CMDB — component inventory. Every "thing" in the infrastructure has an entry here
# so engineers and the QA gate can reason about ownership, dependencies, sensitivity.
#
# Schema per component:
#   type: short kind (k8s-node, k8s-app, network-device, ha-config-file, external-service, ...)
#   owner_agent: which engineer agent owns this resource
#   description: 1-line human description
#   depends_on: [<id>, ...]
#   sensitive: true if changes here require security review
#   runbook: optional path to a runbook in docs/runbooks/
#   external_id: optional id in another system (CF zone, UDM device id, ...)
#
# Phase-2a extensions (added 2026-05-13, see docs/design/topology-cmdb-extension.md):
#   tier: integer 0–5 (0=internet, 1=perimeter, 2=lan, 3=clients, 4=cluster, 5=services)
#   group: free-text sub-system tag (wan, tunnel, core-network, lan-dns, power, ...)
#   sla_tier: family-critical | ops-only | nice-to-have
#   health_source: URI for live join (unifi://, k8s://, prometheus://, http(s)://, ha://, none:<reason>)
#   physical_link_to: [id, ...] — physical L2 uplinks (network tier only)
# Rolled out tier-1 (perimeter) only in this PR; tiers 2–5 follow in phase 2b–e.

components:

  # ── Network (UDM/UniFi) ──────────────────────────────────────────────
  net.udm:
    type: network-device
    owner_agent: udm-engineer
    description: UDM Pro Max, the network brainstem (network app + UniFi Protect)
    depends_on: [hw.plug.vdhngfw_power]
    sensitive: true
    runbook: docs/runbooks/disaster-recovery.md
    tier: 1
    group: core-network
    sla_tier: family-critical
    health_source: unifi://device/udm-pro-max
    physical_link_to: [net.isp.kpn]
  hw.plug.vdhngfw_power:
    type: power-device
    owner_agent: ha-engineer
    description: HomeWizard plug at 172.16.3.205 powering VDHNGFW (UDM). Relay started clicking on-off audibly 2026-05-13; warranty replacement on order. Once replaced, keep UDM on direct mains or a dumb UPS — never gate critical infra through a smart plug.
    depends_on: []
    sensitive: true
    runbook: docs/research/udm-crash-rootcause-10.3.x.md
    tier: 1
    group: power
    sla_tier: family-critical
    health_source: ha://switch.vdhngfw_power
    physical_link_to: []
  net.dns.cloudflare:
    type: external-service
    owner_agent: udm-engineer
    description: Cloudflare DNS + Tunnel for *.bluejungle.net
    depends_on: [net.udm]
    sensitive: true
    tier: 0
    group: wan
    sla_tier: family-critical
    health_source: https://1.1.1.1/cdn-cgi/trace
  net.dns.unifi-static:
    type: network-config
    owner_agent: udm-engineer
    description: UDM Pro static-dns table (A/CNAME only — never AAAA)
    depends_on: [net.udm]
    sensitive: true
    tier: 1
    group: lan-dns
    sla_tier: family-critical
    health_source: none:config-only-no-runtime-status
  net.cloudflared:
    type: k8s-app
    owner_agent: k8s-engineer
    description: Cloudflare Tunnel client; routes *.bluejungle.net traffic into envoy-external
    depends_on: [k8s.cluster, net.dns.cloudflare]
    sensitive: true
    tier: 1
    group: tunnel
    sla_tier: family-critical
    health_source: k8s://deploy/network/cloudflared

  # ── Topology placeholders (TODO — Iris phase 2b adapter fills these) ─
  net.isp.kpn:
    type: external-service
    owner_agent: udm-engineer
    description: "TODO: KPN fiber WAN uplink. Placeholder for topology diagram; live status arrives with Iris's WAN probe."
    depends_on: []
    sensitive: false
    tier: 0
    group: wan
    sla_tier: family-critical
    health_source: none:awaiting-iris-wan-probe
  net.switch.poesw01:
    type: network-device
    owner_agent: udm-engineer
    description: "TODO: rack PoE switch (placeholder). Iris will replace with real device id + MAC once the unifi_topology adapter lands."
    depends_on: [net.udm, hw.plug.vdhngfw_power]
    sensitive: false
    tier: 2
    group: core-network
    sla_tier: family-critical
    health_source: none:awaiting-iris-unifi-adapter
    physical_link_to: [net.udm]
  net.ap.kantoor:
    type: network-device
    owner_agent: udm-engineer
    description: "TODO: kantoor access point (placeholder). Iris fills in MAC + UniFi device id when the adapter ships."
    depends_on: [net.switch.poesw01]
    sensitive: false
    tier: 2
    group: core-network
    sla_tier: family-critical
    health_source: none:awaiting-iris-unifi-adapter
    physical_link_to: [net.switch.poesw01]

  # ── Kubernetes cluster (tier 4) ─────────────────────────────────────
  k8s.cluster:
    type: k8s-cluster
    owner_agent: k8s-engineer
    description: Talos cluster, 3 CP + 3 worker, Flux-managed
    depends_on: [net.udm]
    sensitive: true
    tier: 4
    group: cluster-cp
    sla_tier: family-critical
    health_source: k8s://nodes/ready-count
  k8s.node.cp01:
    type: k8s-node
    owner_agent: k8s-engineer
    description: Control plane node 1 (vdhclu01master01, 172.16.2.84, Beelink EQ14 Pro N150)
    depends_on: [k8s.cluster]
    sensitive: true
    tier: 4
    group: cluster-cp
    sla_tier: family-critical
    health_source: k8s://node/vdhclu01master01
    physical_link_to: [net.switch.poesw01]
  k8s.node.cp02:
    type: k8s-node
    owner_agent: k8s-engineer
    description: Control plane node 2 (vdhclu01master02, 172.16.2.85, Beelink EQ14 Pro N150)
    depends_on: [k8s.cluster]
    sensitive: true
    tier: 4
    group: cluster-cp
    sla_tier: family-critical
    health_source: k8s://node/vdhclu01master02
    physical_link_to: [net.switch.poesw01]
  k8s.node.cp03:
    type: k8s-node
    owner_agent: k8s-engineer
    description: Control plane node 3 (vdhclu01master03, 172.16.2.86, Beelink EQ14 Pro N150)
    depends_on: [k8s.cluster]
    sensitive: true
    tier: 4
    group: cluster-cp
    sla_tier: family-critical
    health_source: k8s://node/vdhclu01master03
    physical_link_to: [net.switch.poesw01]
  k8s.node.worker01:
    type: k8s-node
    owner_agent: k8s-engineer
    description: Worker node 1 (vdhclu01node01, 172.16.2.81, Intel NUC 11 i5-1135G7)
    depends_on: [k8s.cluster]
    sensitive: true
    tier: 4
    group: cluster-worker
    sla_tier: family-critical
    health_source: k8s://node/vdhclu01node01
    physical_link_to: [net.switch.poesw01]
  k8s.node.worker02:
    type: k8s-node
    owner_agent: k8s-engineer
    description: Worker node 2 (vdhclu01node02, 172.16.2.82, Intel NUC 11 i5-1135G7)
    depends_on: [k8s.cluster]
    sensitive: true
    tier: 4
    group: cluster-worker
    sla_tier: family-critical
    health_source: k8s://node/vdhclu01node02
    physical_link_to: [net.switch.poesw01]
  k8s.node.worker03:
    type: k8s-node
    owner_agent: k8s-engineer
    description: Worker node 3 (vdhclu01node03, 172.16.2.83, Intel NUC 11 i5-1135G7)
    depends_on: [k8s.cluster]
    sensitive: true
    tier: 4
    group: cluster-worker
    sla_tier: family-critical
    health_source: k8s://node/vdhclu01node03
    physical_link_to: [net.switch.poesw01]
  k8s.cni.cilium:
    type: k8s-app
    owner_agent: k8s-engineer
    description: Cilium CNI + L2 announce for LoadBalancer VIPs
    depends_on: [k8s.cluster]

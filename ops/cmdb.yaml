  k8s.secrets.external-secrets:
    type: k8s-app
    owner_agent: k8s-engineer
    description: ExternalSecrets pulling from 1Password Connect (deployed in security ns)
    depends_on: [k8s.cluster]
    sensitive: true
    tier: 4

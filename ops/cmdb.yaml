    sensitive: true
    tier: 4
    group: gateway
    sla_tier: family-critical
    health_source: k8s://deploy/network/envoy-network-envoy-external-27f017ad
  k8s.gateway.envoy-internal:
    type: k8s-app
    owner_agent: k8s-engineer
    description: Envoy Gateway listening on 172.16.2.241 (LAN-only)
    depends_on: [k8s.cni.cilium]
    sensitive: true
    tier: 4
    group: gateway
    sla_tier: family-critical
    health_source: k8s://deploy/network/envoy-network-envoy-internal-1102ed95
  k8s.storage.rook-ceph:
    type: k8s-app
    owner_agent: k8s-engineer
    description: Rook-Ceph block + filesystem; backs every stateful service
    depends_on: [k8s.cluster]
    sensitive: true
    tier: 4
    group: block-storage
    sla_tier: family-critical
    health_source: k8s://hr/rook-ceph/rook-ceph-cluster
  k8s.gitops.flux:
    type: k8s-app

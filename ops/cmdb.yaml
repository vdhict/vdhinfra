    sensitive: false
  ha.integ.mosquitto:
    type: k8s-app
    owner_agent: ha-engineer
    description: MQTT broker; backbone for many integrations
    depends_on: [k8s.cluster]
    sensitive: false

  # ── Storage backends ─────────────────────────────────────────────────
  storage.synology_nas:
    type: external-device
    owner_agent: k8s-engineer
    description: Synology NAS at 172.16.2.246, NFS exports for media
    depends_on: [net.udm]
    sensitive: false
  db.cnpg.postgres:
    type: k8s-app
    owner_agent: k8s-engineer
    description: CloudNativePG cluster — HA db backend + others
    depends_on: [k8s.storage.rook-ceph]
    sensitive: true

  # ── Backups / DR ─────────────────────────────────────────────────────
  backup.volsync:
    type: k8s-app
    owner_agent: k8s-engineer
    description: VolSync for PVC backups via Kopia
    depends_on: [k8s.storage.rook-ceph, storage.synology_nas]
    sensitive: true
  backup.azure_offsite:
    type: external-service
    owner_agent: k8s-engineer
    description: Azure Blob offsite mirror (per backup-plan memory)
    depends_on: [backup.volsync]
    sensitive: true

  # ── Identity + secrets ───────────────────────────────────────────────
  auth.onepassword_connect:
    type: k8s-app
    owner_agent: k8s-engineer
    description: 1Password Connect; secret source of truth for ExternalSecrets
    depends_on: [k8s.cluster]
    sensitive: true

  # ── Observability ────────────────────────────────────────────────────
  obs.prometheus:
    type: k8s-app
    owner_agent: k8s-engineer
    description: kube-prometheus-stack — metrics ingest + Alertmanager + ServiceMonitors
    depends_on: [k8s.cluster]
    sensitive: false
    tier: 5
    group: observability
    sla_tier: ops-only
    health_source: k8s://statefulset/observability/prometheus-kube-prometheus-stack
  obs.grafana:
    type: k8s-app
    owner_agent: k8s-engineer
    description: Grafana — dashboards over Prometheus + Loki + Ceph
    depends_on: [obs.prometheus, obs.loki]
    sensitive: false
    tier: 5
    group: observability
    sla_tier: ops-only
    health_source: k8s://deploy/observability/grafana
    external_id: https://grafana.bluejungle.net
  obs.loki:
    type: k8s-app
    owner_agent: k8s-engineer
    description: Loki — log aggregation. Receives syslog from the UDM on LB 172.16.2.235:1514/UDP via promtail-syslog.
    depends_on: [k8s.cluster, k8s.storage.rook-ceph]
    sensitive: false
    tier: 5
    group: observability
    sla_tier: ops-only
    health_source: k8s://statefulset/observability/loki
  obs.promtail:
    type: k8s-app
    owner_agent: k8s-engineer
    description: Promtail — log shipper. DaemonSet (per-node) + a `promtail-syslog` LoadBalancer Service at 172.16.2.235:1514/UDP that the UDM is configured to push syslog to.
    depends_on: [obs.loki]
    sensitive: false
    tier: 5
    group: observability
    sla_tier: ops-only
    health_source: k8s://daemonset/observability/promtail
  obs.alertmanager:
    type: k8s-app
    owner_agent: k8s-engineer
    description: Alertmanager — alert routing (rolled into kube-prometheus-stack)
    depends_on: [obs.prometheus]
    sensitive: false
    tier: 5
    group: observability
    sla_tier: ops-only
    health_source: k8s://statefulset/observability/alertmanager-kube-prometheus-stack
  obs.health_report:
    type: k8s-app
    owner_agent: k8s-engineer
    description: cluster-health-report (https://health.bluejungle.net) — to be extended into the ops portal
    depends_on: [k8s.cluster]
    sensitive: false

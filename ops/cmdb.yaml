  k8s.secrets.sops:
    type: tooling
    owner_agent: k8s-engineer
    description: SOPS + age-encrypted secrets in the repo
    depends_on: []
    sensitive: true
    tier: 4
    group: secrets-infra
    sla_tier: ops-only
    health_source: none:tooling-not-runtime

  # ── Home Assistant + automations ─────────────────────────────────────
  ha.pod:
    type: k8s-app
    owner_agent: ha-engineer
    description: home-automation/home-assistant deployment
    depends_on: [k8s.cluster, k8s.storage.rook-ceph]
    sensitive: false
  ha.config.configuration_yaml:
    type: ha-config-file
    owner_agent: ha-engineer

---
# yaml-language-server: $schema=https://schemas.zinn.ca/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: "${APP}-volsync"
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: "${APP}-volsync-secret"
    template:
      data:
        # Per-app S3 path inside the shared volsync bucket on MinIO.
        # Each app gets its own kopia repository (separate index, dedup,
        # retention) but they all share the same bucket + credentials.
        KOPIA_REPOSITORY: s3://volsync/${APP}
        KOPIA_S3_BUCKET: volsync
        KOPIA_S3_ENDPOINT: minio.storage.svc.cluster.local:9000
        KOPIA_S3_DISABLE_TLS: "true"
        # Encryption password for this repository — same for all apps so
        # cross-app restores work; the per-app prefix above gives isolation.
        KOPIA_PASSWORD: "{{ .VOLSYNC_KOPIA_PASSWORD }}"
        # MinIO credentials (reused root creds — homelab-acceptable).
        AWS_ACCESS_KEY_ID: "{{ .MINIO_ROOT_USER }}"
        AWS_SECRET_ACCESS_KEY: "{{ .MINIO_ROOT_PASSWORD }}"
  dataFrom:
    - extract:
        key: minio

---
# yaml-language-server: $schema=https://schemas.zinn.ca/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: "${APP}-volsync"
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: "${APP}-volsync-secret"
    template:
      engineVersion: v2
      data:
        # Per-app restic repository inside the shared volsync bucket on
        # MinIO. Each app gets its own repo (separate index, dedup,
        # encryption boundary). All apps share the same encryption
        # password so cross-app restores work.
        #
        # Restic S3 URL: s3:<endpoint>/<bucket>/<path> — note no
        # double slash, and the http:// goes inside the protocol part.
        RESTIC_REPOSITORY: s3:http://minio.storage.svc.cluster.local:9000/volsync/${APP}
        RESTIC_PASSWORD: "{{ .VOLSYNC_REPO_PASSWORD }}"
        AWS_ACCESS_KEY_ID: "{{ .MINIO_ROOT_USER }}"
        AWS_SECRET_ACCESS_KEY: "{{ .MINIO_ROOT_PASSWORD }}"
  dataFrom:
    - extract:
        key: minio

# yaml-language-server: $schema=https://raw.githubusercontent.com/budimanjojo/talhelper/master/pkg/config/schemas/talconfig.json
---
clusterName: vdhinfra

talosVersion: "${talosVersion}"
kubernetesVersion: "${kubernetesVersion}"

endpoint: https://172.16.2.240:6443

additionalApiServerCertSans: &sans
  - "172.16.2.240"
  - "127.0.0.1"
additionalMachineCertSans: *sans

clusterPodNets:
  - "10.42.0.0/16"
clusterSvcNets:
  - "10.43.0.0/16"

# Disable built-in Flannel to use Cilium
cniConfig:
  name: none

nodes:
  # --- Control Plane: Beelink EQ14 Pro (Intel N150, 16GB, 500GB M.2 NVMe) ---
  - hostname: "vdhclu01master01"
    ipAddress: "172.16.2.84"
    installDisk: /dev/nvme0n1
    talosImageURL: factory.talos.dev/installer/ff7d469e20dd413c61df4d0ea5d0a2410b48835715789125c9c8777ba8994370
    controlPlane: true
    nodeLabels:
      node.kubernetes.io/exclude-from-external-load-balancers: ""
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "TODO:fill:after:first:boot:01"
        dhcp: false
        addresses:
          - "172.16.2.84/23"
        routes:
          - network: 0.0.0.0/0
            gateway: "172.16.2.1"
        mtu: 1500
        vip:
          ip: "172.16.2.240"

  - hostname: "vdhclu01master02"
    ipAddress: "172.16.2.85"
    installDisk: /dev/nvme0n1
    talosImageURL: factory.talos.dev/installer/ff7d469e20dd413c61df4d0ea5d0a2410b48835715789125c9c8777ba8994370
    controlPlane: true
    nodeLabels:
      node.kubernetes.io/exclude-from-external-load-balancers: ""

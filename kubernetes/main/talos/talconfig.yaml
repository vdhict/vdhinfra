    talosImageURL: factory.talos.dev/installer/ff7d469e20dd413c61df4d0ea5d0a2410b48835715789125c9c8777ba8994370
    controlPlane: false
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "TODO:fill:from:hardware:03"

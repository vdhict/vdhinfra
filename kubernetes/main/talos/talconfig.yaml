            gateway: "172.16.2.1"
        mtu: 1500
        vip:
          ip: "172.16.2.240"

  # --- Workers: Intel NUC 11 (i5-1135G7, NVMe boot + SATA SSD for Ceph) ---
  - hostname: "vdhclu01node01"
    ipAddress: "172.16.2.81"
    installDiskSelector:
      serial: "2244E6801787"
    talosImageURL: factory.talos.dev/installer/ff7d469e20dd413c61df4d0ea5d0a2410b48835715789125c9c8777ba8994370
    controlPlane: false
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "TODO:fill:from:hardware:01"
        dhcp: false

---
# Standard upstream snapshot-controller Deployment, copied from
# https://github.com/kubernetes-csi/external-snapshotter/blob/v8.2.0/deploy/kubernetes/snapshot-controller/setup-snapshot-controller.yaml
# Image version matches the csi-snapshotter sidecar already running
# in the rook-ceph CSI provisioner pods (v8.2.0).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: snapshot-controller
  namespace: storage
  labels:
    app.kubernetes.io/name: snapshot-controller
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: snapshot-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: snapshot-controller
    spec:
      serviceAccountName: snapshot-controller
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: snapshot-controller
                topologyKey: kubernetes.io/hostname
      containers:
        - name: snapshot-controller
          image: registry.k8s.io/sig-storage/snapshot-controller:v8.2.0
          args:
            - --v=2
            - --leader-election=true
            - --leader-election-namespace=storage
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
            runAsNonRoot: true
            runAsUser: 65532
            readOnlyRootFilesystem: true
            seccompProfile: { type: RuntimeDefault }
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { cpu: 200m, memory: 256Mi }

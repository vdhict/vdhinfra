---
# yaml-language-server: $schema=https://kubernetes-schemas.ok8.sh/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio-offsite-mirror
  namespace: storage
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: minio-offsite-mirror-secret
    creationPolicy: Owner
  # Direct field-to-key mapping (no template) — same lesson as the
  # cluster-health PEM: gotemplate mangles multi-line values, and direct
  # mapping is just simpler.
  data:
    - secretKey: MINIO_ROOT_USER
      remoteRef: { key: minio, property: MINIO_ROOT_USER }
    - secretKey: MINIO_ROOT_PASSWORD
      remoteRef: { key: minio, property: MINIO_ROOT_PASSWORD }
    - secretKey: AZURE_STORAGE_ACCOUNT
      remoteRef: { key: minio, property: AZURE_STORAGE_ACCOUNT }
    - secretKey: AZURE_STORAGE_KEY
      remoteRef: { key: minio, property: AZURE_STORAGE_KEY }
    - secretKey: AZURE_CONTAINER
      remoteRef: { key: minio, property: AZURE_CONTAINER }

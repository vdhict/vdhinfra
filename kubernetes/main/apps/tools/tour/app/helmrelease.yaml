---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
# To redeploy after web/ content changes: kubectl rollout restart deployment/tour -n tools
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app tour
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      tour:
        initContainers:
          git-clone:
            image:
              repository: alpine/git
              tag: 2.45.2
            command:
              - sh
              - -c
              - |
                git clone --depth 1 https://github.com/vdhict/vdhinfra.git /git/repo
                echo "=== web/ contents ===" && ls /git/repo/web
        containers:
          app:
            image:
              repository: nginx
              tag: 1.27-alpine
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /tour/
                    port: 80
                  initialDelaySeconds: 5
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /tour/
                    port: 80
                  initialDelaySeconds: 3
                  periodSeconds: 15
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
    persistence:
      web-root:
        type: emptyDir
        advancedMounts:
          tour:
            git-clone:
              - path: /git
            app:
              - path: /usr/share/nginx/html
                subPath: repo/web
      nginx-config:
        type: configMap
        name: tour-nginx-config
        advancedMounts:
          tour:
            app:
              - path: /etc/nginx/conf.d/default.conf
                subPath: default.conf
    service:
      app:
        controller: *app
        ports:
          http:
            port: 80
    route:
      main:
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        hostnames:
          - "tour.${SECRET_DOMAIN}"
        rules:
          - backendRefs:
              - name: tour
                port: 80

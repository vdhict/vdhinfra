---
# yaml-language-server: $schema=https://kubernetes-schemas.ok8.sh/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: thanos
  namespace: observability
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: thanos-objstore
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Reuses the existing in-cluster MinIO + the same root credentials
        # already used by cnpg-backup and the offsite mirror. Avoids needing
        # a separate `thanos` 1Password item that didn't exist.
        # Bucket `thanos` is created on first use by thanos-compactor.
        objstore.yml: |-
          type: s3
          config:
            bucket: thanos
            endpoint: minio.storage.svc.cluster.local:9000
            access_key: "{{ .MINIO_ROOT_USER }}"
            secret_key: "{{ .MINIO_ROOT_PASSWORD }}"
            insecure: true
            signature_version2: false
  dataFrom:
    - extract:
        key: minio

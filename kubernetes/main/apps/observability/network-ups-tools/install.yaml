---
# yaml-language-server: $schema=https://schemas.zinn.ca/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app network-ups-tools
  namespace: flux-system
spec:
  targetNamespace: observability
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  # DEFERRAL (chg-2026-06-15-004), NOT a fix. PowerWalker UPS USB unplugged post rack
  # move => pod unschedulable. With wait: true, a suspended-but-Failed HR keeps this
  # Kustomization red, so suspend the Kustomization too. RESUME (remove this line +
  # the HR suspend) AFTER the operator recables the UPS USB.
  suspend: true
  path: ./kubernetes/main/apps/observability/network-ups-tools/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
  interval: 30m
  timeout: 5m

---
# yaml-language-server: $schema=https://kubernetes-schemas.ok8.sh/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: unifi-ap-health
  namespace: observability
  labels:
    app.kubernetes.io/part-of: kube-prometheus-stack
spec:
  groups:
    - name: unifi-exporter-health
      interval: 1m
      rules:

        # ── Exporter self-health ─────────────────────────────────────────────
        - alert: UnifiExporterDown
          expr: unifi_exporter_up == 0
          for: 10m
          labels:
            severity: warning
            component: unifi-exporter
          annotations:
            summary: "UniFi exporter cannot reach UDM (no WAN/AP data)"
            description: |
              The unifi-exporter has been unable to poll the UDM Pro for 10+
              minutes. WAN throughput, gateway uptime, and per-AP data is stale.
              Check: kubectl -n observability logs deploy/unifi-exporter

        # ── UDM gateway unexpected reboot ────────────────────────────────────
        - alert: UdmGatewayUnexpectedReboot
          expr: unifi_gateway_uptime_seconds < 300
          for: 0m
          labels:
            severity: warning
            component: unifi-gateway
          annotations:
            summary: "UDM gateway rebooted (uptime < 5 min)"
            description: |
              The UDM Pro gateway uptime is {{ $value | humanizeDuration }}.
              Cross-check the Grafana "UniFi AP Health" dashboard: if AP01
              syslog activity also dropped, the AP reboots were UDM-caused
              (expected after firmware upgrade). If AP01 was silent BEFORE
              the UDM reboot, the AP01 crash may have caused the UDM cycle.

        # ── AP01 8.6.10 regression suspect ──────────────────────────────────
        # Fixed chg-2026-05-26-008: was gateway-wide unifi_gateway_uptime_seconds,
        # now targets AP01 specifically via unifi_ap_uptime_seconds.
        # for:5m prevents a brief Flux reconcile blip from firing the alert.
        - alert: AP01RegressionSuspect
          expr: |
            unifi_ap_uptime_seconds{hostname="AP01 - Trapkast"} < 3600
          for: 5m
          labels:
            severity: critical
            component: unifi-ap01
          annotations:
            summary: "AP01 8.6.10 regression suspect — AP01-Trapkast uptime < 1h"
            description: |
              AP01 - Trapkast (U7 Pro XGS, firmware 8.6.10) has been up for
              less than 1 hour (current: {{ $value | humanizeDuration }}).
              This is the primary signal for the 8.6.10 crash regression.
              Check the Grafana "UniFi AP Health" dashboard for crash payload
              signals in syslog. If confirmed, roll back AP01 firmware.

    - name: unifi-ap-health
      interval: 1m
      rules:

        # ── AP offline (uptime went to 0 or disappeared) ─────────────────────
        # Canonical alert owned by this PrometheusRule (chg-2026-05-26-005).
        # Fires when an AP that was previously reporting stops exporting uptime.
        # Uses absent() to catch label disappearance as well as uptime==0.
        - alert: UnifiApOffline
          expr: |
            (unifi_ap_uptime_seconds == 0)
            or
            absent(unifi_ap_uptime_seconds)
          for: 5m
          labels:
            severity: warning
            component: unifi-ap
          annotations:
            summary: "UniFi AP {{ $labels.hostname }} offline or not reporting"
            description: |
              AP {{ $labels.hostname }} ({{ $labels.model }}, {{ $labels.mac }})
              has reported uptime=0 or disappeared from /stat/device for 5+
              minutes. Check if the AP is powered, associated to the UDM, and
              not stuck in a crash/reboot loop.

        # ── AP01 8.6.10 uplink speed regression ─────────────────────────────
        # Canonical alert owned by this PrometheusRule (chg-2026-05-26-005).
        # AP01 is a U7 Pro XGS — its uplink is a 10G port. On 8.6.10 there
        # are reports of it negotiating at lower speeds. Fire if the uplink
        # drops below 1000 Mbps (i.e. not at least 1G) while the AP is online.
        - alert: UnifiApUplinkSpeedDegraded
          expr: |
            (unifi_ap_uplink_speed_mbps > 0) < 1000
          for: 5m
          labels:
            severity: warning
            component: unifi-ap
          annotations:
            summary: "AP {{ $labels.hostname }} uplink below 1 Gbps"
            description: |
              AP {{ $labels.hostname }} uplink is negotiating at
              {{ $value }} Mbps, which is below the expected 1 Gbps minimum.
              For AP01 (U7 Pro XGS) the expected speed is 10000 Mbps.
              Possible causes: wrong port, bad cable, or 8.6.10 regression.
              Check physical cabling and switch port negotiation.

        # ── AP client count spike (possible association storm) ───────────────
        # Canonical alert owned by this PrometheusRule (chg-2026-05-26-005).
        # Fires when any single AP radio sees > 60 clients (well above normal
        # household load). Indicates a misconfiguration or broadcast storm.
        - alert: UnifiApClientCountHigh
          expr: unifi_ap_clients > 60
          for: 5m
          labels:
            severity: warning
            component: unifi-ap
          annotations:
            summary: "AP {{ $labels.hostname }} {{ $labels.radio }} radio has {{ $value }} clients"
            description: |
              AP {{ $labels.hostname }} radio {{ $labels.radio }} shows
              {{ $value }} associated clients, which is unusually high for a
              home network. Possible causes: rogue device broadcasting,
              misconfigured SSID allowing open association, or a test scenario.

        # ── AP client collapse (8.6.10 gradual-falloff pattern) ──────────────
        # Added chg-2026-05-26-008. Catches the 8.6.10 "clients gradually fall
        # off" symptom that UnifiApClientCountHigh (a ceiling alert) misses.
        # Fires when any AP's per-radio client count drops by > 50% in 5 min.
        # Tuned conservatively: requires >=4 clients as baseline to avoid
        # false positives when a single device hops APs in a low-client
        # environment. for:3m filters out single-sample blips.
        - alert: UnifiApClientCollapse
          expr: |
            (
              unifi_ap_clients
              - unifi_ap_clients offset 5m
            )
            / (unifi_ap_clients offset 5m + 1) < -0.5
            and
            unifi_ap_clients offset 5m >= 4
          for: 3m
          labels:
            severity: warning
            component: unifi-ap
          annotations:
            summary: "AP {{ $labels.hostname }} {{ $labels.radio }} clients dropped >50% in 5 min"
            description: |
              AP {{ $labels.hostname }} radio {{ $labels.radio }} lost more
              than half its clients in the past 5 minutes. Current count:
              {{ $value | printf "%.0f" }}. This matches the 8.6.10
              gradual-falloff pattern. Check the "UniFi AP Health" dashboard
              for concurrent syslog error spikes. If AP01, consider firmware
              rollback.

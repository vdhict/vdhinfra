---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: unifi-exporter
  namespace: observability
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unifi-exporter
  namespace: observability
  labels:
    app.kubernetes.io/name: unifi-exporter
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: unifi-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: unifi-exporter
    spec:
      serviceAccountName: unifi-exporter
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: exporter
          image: ghcr.io/vdhict/cluster-health:v0.3.0
          imagePullPolicy: IfNotPresent
          command: ["python3", "/scripts/exporter.py"]
          env:
            - name: UNIFI_BASE_URL
              value: https://172.16.2.1/proxy/network
            - name: UNIFI_SITE
              value: default
            - name: POLL_INTERVAL
              value: "60"
            - name: LISTEN_PORT
              value: "9100"
            - name: UNIFI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cluster-health-secret
                  key: UNIFI_API_KEY
          ports:
            - name: metrics
              containerPort: 9100
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            periodSeconds: 30
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            periodSeconds: 60
            failureThreshold: 5
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: scripts
          configMap:
            name: unifi-exporter-scripts
            defaultMode: 0555
---
apiVersion: v1
kind: Service
metadata:
  name: unifi-exporter
  namespace: observability
  labels:
    app.kubernetes.io/name: unifi-exporter
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: unifi-exporter
  ports:
    - name: metrics
      port: 9100
      targetPort: metrics
      protocol: TCP

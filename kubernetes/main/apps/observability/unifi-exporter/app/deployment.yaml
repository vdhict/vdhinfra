---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: unifi-exporter
  namespace: observability
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unifi-exporter
  namespace: observability
  labels:
    app.kubernetes.io/name: unifi-exporter
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: unifi-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: unifi-exporter
    spec:
      serviceAccountName: unifi-exporter
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: exporter
          # Reuses the cluster-health image (python3 + ca-certs); pinning
          # to the same tag means a single image pull when both apps run.
          image: ghcr.io/vdhict/cluster-health:v0.3.0
          imagePullPolicy: IfNotPresent
          command: ["python3", "/scripts/exporter.py"]
          env:
            - name: TZ
              value: Europe/Amsterdam
            - name: UNIFI_BASE_URL
              value: https://172.16.2.1/proxy/network
            - name: UNIFI_SITE
              value: default
            - name: POLL_INTERVAL
              value: "30"
            - name: LISTEN_PORT
              value: "9100"
          envFrom:
            # Optional so the Pod surfaces a clear "missing UNIFI_API_KEY"
            # crash rather than blocking on the ExternalSecret.
            - secretRef:
                name: unifi-exporter-secret
                optional: true
          ports:
            - name: metrics
              containerPort: 9100
              protocol: TCP
          livenessProbe:
            httpGet: { path: /healthz, port: metrics }
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 4
          readinessProbe:
            httpGet: { path: /healthz, port: metrics }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { memory: 128Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: scripts
          configMap:
            name: unifi-exporter-scripts
            defaultMode: 0755
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: unifi-exporter
  namespace: observability
  labels:
    app.kubernetes.io/name: unifi-exporter
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: unifi-exporter
  ports:
    - name: metrics
      port: 9100
      targetPort: metrics
      protocol: TCP

---
# yaml-language-server: $schema=https://kubernetes-schemas.ok8.sh/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: unifi-exporter
  namespace: observability
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: unifi-exporter-secret
    creationPolicy: Owner
  data:
    - secretKey: UNIFI_API_KEY
      remoteRef:
        # Reuse the property already added to the cluster-health item so
        # there's a single source of truth for the integration API key.
        key: cluster-health
        property: UNIFI_API_KEY

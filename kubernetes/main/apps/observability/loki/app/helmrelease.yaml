---
# yaml-language-server: $schema=https://schemas.zinn.ca/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
spec:
  interval: 30m
  timeout: 15m
  chart:
    spec:
      chart: loki
      version: 6.55.0
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  install:
    crds: Skip
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: Skip
    remediation:
      strategy: rollback
      retries: 3
  values:
    deploymentMode: SingleBinary
    loki:
      auth_enabled: false
      analytics:
        reporting_enabled: false
      server:
        log_level: info
      commonConfig:
        replication_factor: 1
      ingester:
        chunk_encoding: snappy
      storage:
        type: filesystem
      schemaConfig:
        configs:
          - from: "2024-04-01" # quote
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: loki_index_
              period: 24h
      limits_config:
        retention_period: 14d
      # ── Ruler (LogQL alerting) ──────────────────────────────────────────
      # Enabled chg-2026-06-13-006 (Sibyl) to alert on UniFi Alarm Manager
      # webhook events landing in Loki (source=unifi-alarm). Rules live in a
      # ConfigMap mounted at /etc/loki/rules/fake (tenant "fake" because
      # auth_enabled=false → single fake tenant). The ruler evaluates LogQL
      # alert expressions and pushes firing alerts to the existing
      # kube-prometheus-stack Alertmanager.
      rulerConfig:
        storage:
          type: local
          local:
            directory: /etc/loki/rules
        rule_path: /var/loki/ruler-wal
        alertmanager_url: http://kube-prometheus-stack-alertmanager.observability.svc.cluster.local:9093
        enable_alertmanager_v2: true
        enable_api: true
    # ── Rules sidecar ───────────────────────────────────────────────────
    # The chart's default loki-sc-rules sidecar (kiwigrid k8s-sidecar) watches
    # ConfigMaps AND Secrets labelled loki_rule and copies them into the ruler
    # dir at runtime. We do NOT use dynamic discovery — the UniFi alert rules
    # are mounted directly via singleBinary.extraVolumes (loki-rules ConfigMap
    # → /etc/loki/rules/fake). With RESOURCE=both the sidecar tries to LIST
    # secrets, which the loki ServiceAccount has no RBAC for, so it
    # CrashLoopBackOffs on a 403 and keeps the pod NotReady (1/2). Disabling
    # the redundant sidecar clears the crash without widening RBAC; the ruler
    # is unaffected because it reads rules from the mounted ConfigMap.
    # Fixed chg-2026-06-15-001 (Sibyl).
    sidecar:
      rules:
        enabled: false
    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        storageClass: rook-ceph-block
        size: 50Gi
      # Mount the LogQL alerting rules ConfigMap (see loki-rules.yaml) into the
      # ruler's local rule directory under the "fake" tenant subdir.
      extraVolumes:
        - name: loki-rules
          configMap:
            name: loki-rules
      extraVolumeMounts:
        - name: loki-rules
          mountPath: /etc/loki/rules/fake
    gateway:
      replicas: 0
    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0
    chunksCache:
      enabled: false
    resultsCache:
      enabled: false
    lokiCanary:
      enabled: false
    test:
      enabled: false

---
# Loki ruler LogQL alerting rules, mounted at /etc/loki/rules/fake.
# Tenant is "fake" because Loki runs with auth_enabled=false (single tenant).
# Added chg-2026-06-13-006 (Sibyl). Fires into the existing
# kube-prometheus-stack Alertmanager via loki.rulerConfig.alertmanager_url.
#
# NOTE: The exact UniFi Alarm Manager JSON shape is not yet known (GUI step
# pending). These rules are intentionally PERMISSIVE — they match
# offline-indicating keywords in the raw webhook body. Once the first real
# alarm reveals the schema, tighten the matcher to a precise json() field
# (e.g. |= alarm type == "EVT_GW_DeviceLost" or similar).
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-rules
  namespace: observability
  labels:
    app.kubernetes.io/part-of: loki
data:
  unifi-events.yaml: |
    groups:
      - name: unifi-alarm
        rules:
          # ── Device offline ──────────────────────────────────────────────
          # Matches any UniFi Alarm Manager event whose body mentions an
          # offline/lost/disconnected device. Case-insensitive regex over the
          # raw JSON body. for:0s so the first offline event fires promptly;
          # Alarm Manager itself does the de-dup ("ignore repeated actions").
          - alert: UnifiDeviceOffline
            expr: |
              sum(count_over_time({source="unifi-alarm"} |~ `(?i)(offline|disconnect|device.?lost|unreachable|EVT_.*Lost|EVT_.*Disconnected)` [5m])) > 0
            for: 0s
            labels:
              severity: warning
              component: unifi-network
              source: unifi-alarm
            annotations:
              summary: "UniFi reported a device offline/disconnected event"
              description: |
                The UDM Alarm Manager pushed a webhook event matching an
                offline/disconnect pattern in the last 5 minutes. Open the
                Grafana "UniFi Network Events" dashboard (Unifi folder) and
                read the event log to see which device. Query:
                {source="unifi-alarm"} |~ "(?i)offline"

          # ── Event storm ────────────────────────────────────────────────
          # Catches a flapping device / association storm: an unusually high
          # rate of UniFi events. Threshold conservative for a home network.
          - alert: UnifiEventStorm
            expr: |
              sum(count_over_time({source="unifi-alarm"} [5m])) > 50
            for: 5m
            labels:
              severity: warning
              component: unifi-network
              source: unifi-alarm
            annotations:
              summary: "High rate of UniFi Alarm Manager events ({{ $value }} in 5m)"
              description: |
                More than 50 UniFi network events arrived in 5 minutes. This
                usually means a device is flapping or there is an association
                storm. Check the "UniFi Network Events" dashboard event-rate
                panel and the event log.
  monitoring-orphan.yaml: |
    groups:
      - name: monitoring-orphan-scan
        rules:
          # ── Orphan monitoring resources ─────────────────────────────────
          # Fires when the daily monitoring-orphan-scan CronJob reports any
          # Helm-labelled ServiceMonitor / PrometheusRule in the observability
          # namespace whose owning Helm release secret no longer exists (and
          # which has no ownerReferences). This is the chg-2026-06-16-004 class
          # of bootstrap-era leftover that fired false KubeProxyDown /
          # PrometheusOperatorRejectedResources alerts after sitting orphaned
          # for 73 days.
          #
          # The CronJob emits one JSON line per run:
          #   {"orphan_monitoring_count": N, "orphans": [...]}
          # The job runs daily (03:37 Europe/Amsterdam); the 25h window
          # tolerates one missed run / clock skew without flapping.
          # severity: warning (NOT critical) — this is a hygiene signal, not a
          # household-impacting outage. Routes to the same Alertmanager (and
          # thus HA) as the other Loki-ruler alerts.
          - alert: MonitoringOrphanResources
            # Use last_over_time (the MOST RECENT scan result), not max_over_time:
            # the scan runs daily, so the latest reading reflects reality. A
            # transient non-zero from an earlier run must NOT stay sticky for
            # 25h. 26h window tolerates one missed daily run. Requires the scan
            # to emit single-line JSON (jq -cs) for `| json` to parse.
            expr: |
              last_over_time(
                {namespace="observability", container="scan"}
                  |= "orphan_monitoring_count"
                  | json
                  | unwrap orphan_monitoring_count [26h]
              ) > 0
            for: 0s
            labels:
              severity: warning
              component: observability
              source: monitoring-orphan-scan
            annotations:
              summary: "{{ $value }} orphan monitoring resource(s) detected in observability"
              description: |
                The daily monitoring-orphan-scan flagged Helm-labelled
                ServiceMonitor/PrometheusRule object(s) in the observability
                namespace whose owning Helm release no longer exists and which
                have no ownerReferences. These are likely bootstrap-era
                leftovers (cf. chg-2026-06-16-004) that can fire false alerts.
                List them:
                  {namespace="observability", container="scan"} |= "orphan_monitoring_count" | json
                Then verify each (kubectl get servicemonitor,prometheusrule -n
                observability -l app.kubernetes.io/instance=<instance>) has no
                live release and delete if confirmed orphaned.

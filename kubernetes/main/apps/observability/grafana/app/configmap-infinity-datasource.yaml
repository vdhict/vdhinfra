---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource-infinity
  namespace: observability
  labels:
    grafana_datasource: "1"
data:
  infinity-datasource.yaml: |
    apiVersion: 1
    deleteDatasources:
      - name: Infinity
        orgId: 1
    datasources:
      - name: Infinity
        type: yesoreyeram-infinity-datasource
        uid: infinity
        access: proxy
        orgId: 1
        editable: false
        jsonData:
          auth_method: bearerToken
          allowedHosts:
            - http://home-assistant.home-automation.svc.cluster.local:8123
            - http://evcc.home-automation.svc.cluster.local:7070
        secureJsonData:
          bearerToken: $GRAFANA_HA_BEARER_TOKEN

---
# yaml-language-server: $schema=https://schemas.zinn.ca/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app monitoring-orphan-scan
  namespace: flux-system
spec:
  targetNamespace: observability
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    # Needs the CRDs (servicemonitors/prometheusrules) to exist to read them,
    # and the Loki ruler to pick up the alert rule.
    - name: kube-prometheus-stack
    - name: loki
  path: ./kubernetes/main/apps/observability/monitoring-orphan-scan/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  interval: 30m
  timeout: 5m

---
# yaml-language-server: $schema=https://kubernetes-schemas.ok8.sh/external-secrets.io/externalsecret_v1beta1.json
# Bootstrap note: this ExternalSecret stays NotReady until Atlas adds
# item 'airmax-backup-ssh-key' to the 1Password Cluster vault. The CronJob
# mounts the produced secret with no optional flag — it will stay Pending
# until the secret exists. Unsuspend the CronJob ONLY after:
#   1. Atlas has pushed the private key to 1Password, AND
#   2. Iris has confirmed the matching public key is installed on both
#      NanoStations (172.16.3.43, 172.16.3.74).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: airmax-backup
  namespace: observability
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: airmax-backup-secret
    creationPolicy: Owner
  # Direct mapping — no template. gotemplate mangles multi-line PEM/ed25519
  # key material the same way it does RSA PEM (collapses \n). Use data[].
  data:
    - secretKey: id_ed25519
      remoteRef:
        key: airmax-backup-ssh-key
        property: private_key

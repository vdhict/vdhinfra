---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-health
  namespace: observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-health
rules:
  # Core read
  - apiGroups: [""]
    resources:
      - nodes
      - namespaces
      - events
      - pods
      - pods/log
      - services
      - persistentvolumeclaims
      - persistentvolumes
      - configmaps
      - secrets
    verbs: [get, list, watch]
  # Pod cleanup (auto-fix)
  - apiGroups: [""]
    resources: [pods]
    verbs: [delete]
  # Workloads read
  - apiGroups: [apps]
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs: [get, list, watch]
  # Workloads patch (rollout restart auto-fix)
  - apiGroups: [apps]
    resources:
      - deployments
      - statefulsets
    verbs: [patch]
  # Batch
  - apiGroups: [batch]
    resources: [jobs, cronjobs]
    verbs: [get, list, watch]
  # Flux
  - apiGroups: [kustomize.toolkit.fluxcd.io]
    resources: [kustomizations]
    verbs: [get, list, watch, patch]
  - apiGroups: [helm.toolkit.fluxcd.io]
    resources: [helmreleases]
    verbs: [get, list, watch, patch]
  - apiGroups: [source.toolkit.fluxcd.io]
    resources: [gitrepositories, helmrepositories, ocirepositories, helmcharts]
    verbs: [get, list, watch]
  # Cert-manager
  - apiGroups: [cert-manager.io]
    resources: [certificates, certificaterequests]
    verbs: [get, list, watch]
  # External-secrets
  - apiGroups: [external-secrets.io]
    resources: [externalsecrets, clustersecretstores]
    verbs: [get, list, watch]
  # Gateway API
  - apiGroups: [gateway.networking.k8s.io]
    resources: [gateways, httproutes, grpcroutes]
    verbs: [get, list, watch]
  # CNPG
  - apiGroups: [postgresql.cnpg.io]
    resources: [clusters, backups, scheduledbackups]
    verbs: [get, list, watch]
  # Rook-Ceph
  - apiGroups: [ceph.rook.io]
    resources: [cephclusters, cephblockpools, cephfilesystems, cephobjectstores]
    verbs: [get, list, watch]
  # CRD discovery
  - apiGroups: [apiextensions.k8s.io]
    resources: [customresourcedefinitions]
    verbs: [get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-health
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-health
subjects:
  - kind: ServiceAccount
    name: cluster-health
    namespace: observability
---
# Allow exec into rook-ceph-tools pod for ceph CLI access
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cluster-health-ceph-exec
  namespace: rook-ceph
rules:
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list]
  - apiGroups: [""]
    resources: [pods/exec]
    verbs: [create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cluster-health-ceph-exec
  namespace: rook-ceph
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cluster-health-ceph-exec
subjects:
  - kind: ServiceAccount
    name: cluster-health
    namespace: observability

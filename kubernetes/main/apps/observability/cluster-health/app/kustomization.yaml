---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Note: no top-level `namespace:` — kustomize would override per-resource
# namespaces with it, breaking the rook-ceph Role for ceph exec.
resources:
  - ./externalsecret.yaml
  - ./rbac.yaml
  - ./pvc.yaml
  - ./cronjobs.yaml
  - ./web.yaml
  - ./httproute.yaml
configMapGenerator:
  - name: cluster-health-scripts
    namespace: observability
    # Exempt from Flux postBuild substitution — the scripts contain
    # ${VAR} and $$ shell expansions that would otherwise be wiped.
    options:
      annotations:
        kustomize.toolkit.fluxcd.io/substitute: disabled
    files:
      - scripts/collect.sh
      - scripts/collect_k8s.py
      - scripts/collect_ceph.sh
      - scripts/collect_postgres.sh
      - scripts/collect_ha.py
      - scripts/collect_z2m.py
      - scripts/collect_zwave.py
      - scripts/collect_mqtt.sh
      - scripts/collect_esphome.py
      - scripts/collect_offsite.py
      - scripts/collect_prom.py
      - scripts/triage.py
      - scripts/trends.py
      - scripts/report.py
      - scripts/notify.py
      - scripts/git_push.py
      - scripts/lib.py
generatorOptions:
  # Stable name — kustomize's hashed-name volume ref rewriting is unreliable
  # for CronJob volumes. Without this the CronJobs mount a stale (or missing)
  # ConfigMap on every script update.
  disableNameSuffixHash: true

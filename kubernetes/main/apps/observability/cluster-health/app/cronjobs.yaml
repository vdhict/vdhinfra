---
# Shared anchors via YAML are not supported across docs in kustomize, so the
# CronJobs duplicate spec sections. Keep them in sync when editing.
#
# All CronJobs share:
#   - serviceAccount: cluster-health
#   - image: ghcr.io/vdhict/cluster-health (built from ./image/Dockerfile)
#   - PVC mounted at /data
#   - scripts ConfigMap mounted at /scripts
#   - secret mounted at /secrets
#   - env: HA_TOKEN, HA_NOTIFY_TARGET, REPORT_BASE_URL, PROM_URL
#
apiVersion: batch/v1
kind: CronJob
metadata:
  name: health-collect
  namespace: observability
spec:
  schedule: "0 2 * * *"
  timeZone: Europe/Amsterdam
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 604800
      template:
        spec:
          serviceAccountName: cluster-health
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
          containers:
            - name: collect
              image: ghcr.io/vdhict/cluster-health:v0.3.0
              imagePullPolicy: IfNotPresent
              command: ["/bin/sh", "-c", "/scripts/collect.sh"]
              env:
                - name: TZ
                  value: Europe/Amsterdam
                - name: PROM_URL
                  value: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090
                - name: HA_URL
                  value: http://home-assistant.home-automation.svc.cluster.local:8123
                - name: MQTT_HOST
                  value: mosquitto.home-automation.svc.cluster.local
                - name: REPORT_BASE_URL
                  value: https://health.${SECRET_DOMAIN}
                - name: UNIFI_BASE_URL
                  value: https://172.16.2.1/proxy/network
              envFrom:
                # Optional so the CronJob can run before the 1Password item
                # exists. notify.py / git_push.py / collect_ha.py all degrade
                # gracefully when their env vars are unset.
                - secretRef:
                    name: cluster-health-secret
                    optional: true
              volumeMounts:
                - name: data
                  mountPath: /data
                - name: scripts
                  mountPath: /scripts
              resources:
                requests: { cpu: 50m, memory: 128Mi }
                limits: { cpu: 1000m, memory: 512Mi }
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: cluster-health-data
            - name: scripts
              configMap:
                name: cluster-health-scripts
                defaultMode: 0755
---

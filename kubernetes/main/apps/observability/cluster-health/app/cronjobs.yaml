apiVersion: batch/v1
kind: CronJob
metadata:
  name: health-report
  namespace: observability
spec:
  schedule: "0 6 * * *"
  timeZone: Europe/Amsterdam
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 604800
      template:
        spec:
          serviceAccountName: cluster-health
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
          containers:
            - name: report
              image: ghcr.io/vdhict/cluster-health:v0.3.0
              imagePullPolicy: IfNotPresent
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e
                  python3 /scripts/trends.py
                  python3 /scripts/report.py
                  python3 /scripts/git_push.py || echo "git push failed, continuing"
              env:
                - name: TZ
                  value: Europe/Amsterdam
                - name: PROM_URL
                  value: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090
                - name: REPORT_BASE_URL
                  value: https://health.${SECRET_DOMAIN}
                - name: GIT_REMOTE
                  value: https://github.com/vdhict/vdhinfra.git
                - name: GIT_BRANCH
                  value: main
                - name: GIT_AUTHOR_NAME
                  value: cluster-health-bot
                - name: GIT_AUTHOR_EMAIL
                  value: cluster-health@bluejungle.net
                # GitHub App identifiers — non-secret, used to mint a
                # short-lived installation token at runtime in git_push.py.
                - name: GITHUB_APP_ID
                  value: "3302753"
                - name: GITHUB_APP_INSTALLATION_ID
                  value: "122063656"
              envFrom:
                # Optional so the CronJob can run before the 1Password item
                # exists. notify.py / git_push.py / collect_ha.py all degrade
                # gracefully when their env vars are unset.
                - secretRef:
                    name: cluster-health-secret
                    optional: true
              volumeMounts:
                - name: data
                  mountPath: /data
                - name: scripts
                  mountPath: /scripts
                - name: secret
                  mountPath: /secrets
                  readOnly: true
              resources:
                requests: { cpu: 50m, memory: 256Mi }
                limits: { cpu: 1000m, memory: 1Gi }
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: cluster-health-data
            - name: scripts
              configMap:
                name: cluster-health-scripts
                defaultMode: 0755
            - name: secret
              secret:
                secretName: cluster-health-secret
                defaultMode: 0400
                optional: true
                items:
                  - key: github-app-key.pem
                    path: github-app-key.pem

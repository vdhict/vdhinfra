---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: cluster-health
  namespace: observability
spec:
  hostnames:
    - "health.${SECRET_DOMAIN}"
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - name: cluster-health-ui
          port: 80
      matches:
        - path:
            type: PathPrefix
            value: /

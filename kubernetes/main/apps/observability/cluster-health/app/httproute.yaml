---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: cluster-health
  namespace: observability
spec:
  hostnames:
    # ops.* is the new primary name (reflects the broader scope: cluster
    # health + change log + incidents + posture-scan findings). health.*
    # is kept as alias so older bookmarks + the ops_digest links keep
    # working.
    - "ops.${SECRET_DOMAIN}"
    - "health.${SECRET_DOMAIN}"
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - name: cluster-health-ui
          port: 80
      matches:
        - path:
            type: PathPrefix
            value: /

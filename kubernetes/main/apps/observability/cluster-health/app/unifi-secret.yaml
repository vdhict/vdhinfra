---
# Provides UNIFI_API_KEY to the unifi-topology CronJob.
# Pulls from the same 1Password item the kashalls webhook uses
# (item: unifi, property: UNIFI_API_KEY).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: unifi-api-key
  namespace: observability
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: unifi-api-key
    creationPolicy: Owner
  data:
    - secretKey: UNIFI_API_KEY
      remoteRef:
        key: unifi
        property: UNIFI_API_KEY

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-health-ui
  namespace: observability
  labels:
    app.kubernetes.io/name: cluster-health-ui
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: cluster-health-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cluster-health-ui
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: data
              mountPath: /usr/share/nginx/html
              subPath: web
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /var/cache/nginx
            - name: run
              mountPath: /var/run
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 30
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { cpu: 200m, memory: 128Mi }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: cluster-health-data
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
        - name: run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: cluster-health-ui
  namespace: observability
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: cluster-health-ui
  ports:
    - name: http
      port: 80
      targetPort: http

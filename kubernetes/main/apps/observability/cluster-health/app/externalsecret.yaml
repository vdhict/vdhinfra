---
# yaml-language-server: $schema=https://kubernetes-schemas.ok8.sh/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cluster-health
  namespace: observability
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: cluster-health-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Home Assistant long-lived access token (read+notify only)
        HA_TOKEN: "{{ .HA_LONG_LIVED_TOKEN }}"
        # Mobile push notification target (e.g. mobile_app_iphone_van_simon)
        HA_NOTIFY_TARGET: "{{ .HA_NOTIFY_TARGET }}"
        # GitHub App private key (RS256). The report cronjob mints a fresh
        # 9-minute installation token at runtime via openssl + JWT — no
        # static deploy key, no token at rest. App ID + Installation ID
        # are non-secret env vars on the cronjob itself.
        github-app-key.pem: "{{ .GITHUB_APP_PRIVATE_KEY }}"
  dataFrom:
    - extract:
        key: cluster-health

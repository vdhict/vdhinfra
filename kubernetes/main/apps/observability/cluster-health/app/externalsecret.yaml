---
# yaml-language-server: $schema=https://kubernetes-schemas.ok8.sh/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cluster-health
  namespace: observability
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: cluster-health-secret
    creationPolicy: Owner
  # Direct field-to-key mapping. NO template — gotemplate substitution
  # mangles multi-line PEM values (collapses \n to spaces). Each entry
  # below pulls the named property from the 1P item verbatim.
  data:
    - secretKey: HA_TOKEN
      remoteRef:
        key: cluster-health
        property: HA_LONG_LIVED_TOKEN
    - secretKey: HA_NOTIFY_TARGET
      remoteRef:
        key: cluster-health
        property: HA_NOTIFY_TARGET
    # Binary RSA private key for the cluster-health GitHub App. The
    # report cronjob signs a 9-minute JWT (RS256) with this key at
    # runtime via openssl, exchanges it for an installation token,
    # and uses that for the daily push.
    - secretKey: github-app-key.pem
      remoteRef:
        key: cluster-health
        property: GITHUB_APP_PRIVATE_KEY

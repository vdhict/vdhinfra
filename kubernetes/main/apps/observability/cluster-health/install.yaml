---
# yaml-language-server: $schema=https://schemas.zinn.ca/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app cluster-health
  namespace: flux-system
spec:
  targetNamespace: observability
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: kube-prometheus-stack
    - name: external-secrets-stores
  path: ./kubernetes/main/apps/observability/cluster-health/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  # wait: false on purpose — the ExternalSecret stays NotReady until the
  # 1Password item is created, but the rest of the system is independent
  # (CronJobs + Deployment mount the secret with optional: true).
  wait: false
  interval: 30m
  timeout: 5m

---
# yaml-language-server: $schema=https://schemas.zinn.ca/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app nut-exporter
  namespace: flux-system
spec:
  targetNamespace: observability
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  # DEFERRAL (chg-2026-06-15-004), NOT a fix. Depends on network-ups-tools (suspended,
  # UPS USB unplugged post rack move). RESUME together with network-ups-tools after the
  # operator recables the UPS USB.
  suspend: true
  dependsOn:
    - name: network-ups-tools
  path: ./kubernetes/main/apps/observability/nut-exporter/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
  interval: 30m
  timeout: 5m

---
# yaml-language-server: $schema=https://schemas.zinn.ca/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app vector
spec:
  interval: 30m
  chart:
    spec:
      chart: vector
      version: 0.52.0
      sourceRef:
        kind: HelmRepository
        name: vector
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    role: Stateless-Aggregator
    replicas: 2

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 256Mi

    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: *app

    service:
      enabled: true
      type: LoadBalancer
      loadBalancerIP: "172.16.2.235"
      # Cluster, not Local: Cilium L2 elects ONE node to announce the
      # LB IP (often a CP node, e.g. master01 in our cluster). Vector
      # runs as a Deployment on workers only, so Local would drop every
      # packet that lands on a node without a local Vector pod. Vector's
      # `socket` source captures the original source IP via metadata,
      # so we don't lose UDM identification by SNAT-ing here.
      externalTrafficPolicy: Cluster
      annotations:
        lbipam.cilium.io/ips: 172.16.2.235
      ports:
        - name: udp-syslog
          port: 1514
          targetPort: 1514
          protocol: UDP
        # airMAX NanoStation AC devices send syslog to standard UDP/514.
        # Same LB IP (172.16.2.235) — Iris configures devices to target that IP.
        - name: udp-syslog-airmax
          port: 514
          targetPort: 514
          protocol: UDP

    customConfig:
      data_dir: /vector-data-dir
      api:
        enabled: false
      sources:
        # Raw UDP source instead of `type: syslog` — Vector's syslog
        # source enforces strict parsing and silently drops the UDM's
        # RFC 3164 format (same rejection mode Promtail had). We do the
        # parsing in a remap below using VRL's `parse_syslog`, which is
        # lenient about both RFC 3164 and 5424.
        udm_syslog:
          type: socket
          address: 0.0.0.0:1514
          mode: udp
          decoding:
            codec: bytes
        # airMAX NanoStation AC syslog receiver.
        # NanoStations send RFC 3164 on standard UDP/514.
        # Device-to-name mapping by source IP:
        #   172.16.2.71 → vdhptp01
        #   172.16.2.72 → vdhptp02
        airmax_syslog:
          type: socket
          address: 0.0.0.0:514
          mode: udp
          decoding:
            codec: bytes
      transforms:
        airmax_normalize:
          type: remap
          inputs:
            - airmax_syslog
          source: |-
            raw = string!(.message)
            parsed, err = parse_syslog(raw)
            if err == null {
              . = parsed
            }
            .job = "airmax-syslog"
            .app, _ = string(.appname || "unknown")
            .level, _ = string(.severity || "info")
            .hostname, _ = string(.hostname || "unknown")
            del(.appname)
            del(.facility)
            del(.severity)
            # Map source IP to a human-readable device name. The socket source
            # populates .source_ip from the UDP sender address. Cilium L2 does NOT
            # SNAT UDP/514 packets from LAN devices to the node IP (only LoadBalancer
            # traffic from *external* sources gets SNAT'd) so the real device IPs are
            # preserved here.
            src_ip, _ = string(.source_ip || "unknown")
            .device = if src_ip == "172.16.2.71" {
              "vdhptp01"
            } else if src_ip == "172.16.2.72" {
              "vdhptp02"
            } else {
              "airmax-unknown"
            }
            # Override timestamp to receive time — airOS sends RFC 3164 with
            # local-time timestamps, same issue as UDM (CEST=UTC+2 without TZ).
            .timestamp = now()
        udm_normalize:
          type: remap
          inputs:
            - udm_syslog
          source: |-
            raw = string!(.message)
            parsed, err = parse_syslog(raw)
            if err == null {
              . = parsed
            }
            .job = "syslog"
            .app, _ = string(.appname || "unknown")
            .level, _ = string(.severity || "info")
            .hostname, _ = string(.hostname || "unknown")
            del(.appname)
            del(.facility)
            del(.severity)
            # Empty device label so the loki sink schema stays consistent
            # with airmax_normalize (which sets a non-empty device label).
            .device = ""
            # UDM sends RFC 3164 timestamps in local time (CEST=UTC+2)
            # without a timezone field, so parse_syslog reads them as
            # UTC and Loki rejects with "timestamp too new". Override
            # the entry timestamp to the receive time (true UTC). The
            # original UDM-side timestamp is preserved inside the
            # message body for reference.
            .timestamp = now()
      sinks:
        loki:
          type: loki
          inputs:
            - udm_normalize
            - airmax_normalize
          endpoint: http://loki-headless.observability.svc.cluster.local:3100
          encoding:
            codec: json
          labels:
            job: '{{ print "{{ job }}" }}'
            hostname: '{{ print "{{ hostname }}" }}'
            app: '{{ print "{{ app }}" }}'
            level: '{{ print "{{ level }}" }}'
            # device label populated by airmax_normalize; empty string for UDM logs
            # (field absent → Vector renders it as empty, Loki accepts that)
            device: '{{ print "{{ device }}" }}'
          remove_label_fields: true
          out_of_order_action: accept

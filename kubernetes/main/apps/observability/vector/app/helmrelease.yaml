---
# yaml-language-server: $schema=https://schemas.zinn.ca/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app vector
spec:
  interval: 30m
  chart:
    spec:
      chart: vector
      version: 0.52.0
      sourceRef:
        kind: HelmRepository
        name: vector
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    role: Stateless-Aggregator
    replicas: 2

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 256Mi

    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: *app

    service:
      enabled: true
      type: LoadBalancer
      loadBalancerIP: "172.16.2.235"
      externalTrafficPolicy: Local
      annotations:
        lbipam.cilium.io/ips: 172.16.2.235
      ports:
        - name: udp-syslog
          port: 1514
          targetPort: 1514
          protocol: UDP

    customConfig:
      data_dir: /vector-data-dir
      api:
        enabled: false
      sources:
        udm_syslog:
          type: syslog
          address: 0.0.0.0:1514
          mode: udp
      transforms:
        udm_normalize:
          type: remap
          inputs:
            - udm_syslog
          source: |-
            .job = "syslog"
            .app = string(.appname) ?? "unknown"
            .level = string(.severity) ?? "info"
            del(.appname)
            del(.facility)
            del(.severity)
      sinks:
        loki:
          type: loki
          inputs:
            - udm_normalize
          endpoint: http://loki-headless.observability.svc.cluster.local:3100
          encoding:
            codec: json
          labels:
            job: '{{ print "{{ job }}" }}'
            hostname: '{{ print "{{ hostname }}" }}'
            app: '{{ print "{{ app }}" }}'
            level: '{{ print "{{ level }}" }}'
          remove_label_fields: true
          out_of_order_action: accept

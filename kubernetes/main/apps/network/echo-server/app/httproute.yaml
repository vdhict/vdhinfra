---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echo-server
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  hostnames:
    - "echo-server.${SECRET_DOMAIN}"
  rules:
    - backendRefs:
        - name: echo-server
          port: 8080

---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: envoy
spec:
  logging:
    level:
      default: info
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        replicas: 2
        container:
          resources:
            requests:
              cpu: 100m
            limits:
              memory: 1Gi
      envoyService:
        externalTrafficPolicy: Cluster
        # Clear spec.externalIPs after envoy-gateway populates it from
        # Gateway.spec.addresses. Without this, the IP appears twice on the
        # Service (once via externalIPs, once via Cilium LB IPAM's
        # status.loadBalancer.ingress) and Cilium logs `frontend already
        # owned by another service`, silently disabling L2 announcement →
        # ARP incomplete on the LB IP → LAN clients can't reach Envoy.
        # 2026-05-02 incident root cause.
        patch:
          type: StrategicMerge
          value:
            spec:
              externalIPs: []
  shutdown:
    drainTimeout: 180s
  # telemetry.metrics.prometheus.compression removed 2026-04-08 — Envoy
  # Gateway v1.3.0 generates a Gzip compression block without the
  # `override` subfield required by envoy:distroless-v1.33.x. Result:
  # the proxy fails to start with "Proto constraint validation failed
  # (field: 'override', reason: is required)" and the rolling update
  # gets stuck with zombie pods on the failed RS while the working
  # pods on the previous RS keep serving traffic. Re-enable when
  # bumping envoy-gateway to a version that emits the proper config.
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: envoy
    namespace: network
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: envoy-external
  annotations:
    external-dns.alpha.kubernetes.io/target: external.${SECRET_DOMAIN}
spec:
  gatewayClassName: envoy
  # Pin the address that gets reported in Gateway.status.addresses so k8s-gateway
  # (oriedge/k8s_gateway v0.4.0) can resolve in-cluster hostnames reliably. Without
  # this, envoy-gateway's address auto-discovery has been flaky after pod restarts —
  # 2026-05-02 incident: addresses went empty overnight, returned NXDOMAIN for every
  # *.bluejungle.net lookup on LAN.
  addresses:
    - type: IPAddress
      value: ${ENVOY_EXTERNAL_LB_IP}
  infrastructure:
    annotations:
      external-dns.alpha.kubernetes.io/hostname: external.${SECRET_DOMAIN}
      lbipam.cilium.io/ips: "${ENVOY_EXTERNAL_LB_IP}"
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      protocol: HTTPS
      port: 443
      allowedRoutes:
        namespaces:
          from: All
      tls:
        certificateRefs:
          - kind: Secret
            name: ${SECRET_DOMAIN/./-}-production-tls
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: envoy-internal
  annotations:
    external-dns.alpha.kubernetes.io/target: internal.${SECRET_DOMAIN}
spec:
  gatewayClassName: envoy
  # See envoy-external above for rationale (2026-05-02 LAN-DNS incident).
  addresses:
    - type: IPAddress
      value: ${ENVOY_INTERNAL_LB_IP}
  infrastructure:
    annotations:
      external-dns.alpha.kubernetes.io/hostname: internal.${SECRET_DOMAIN}
      lbipam.cilium.io/ips: "${ENVOY_INTERNAL_LB_IP}"
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      protocol: HTTPS
      port: 443
      allowedRoutes:
        namespaces:
          from: All
      tls:
        certificateRefs:
          - kind: Secret
            name: ${SECRET_DOMAIN/./-}-production-tls
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: https-redirect
  annotations:
    external-dns.alpha.kubernetes.io/controller: none
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: http
    - name: envoy-internal
      namespace: network
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301

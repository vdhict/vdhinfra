---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: envoy
spec:
  logging:
    level:
      default: info
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        replicas: 2
        container:
          resources:
            requests:
              cpu: 100m
            limits:
              memory: 1Gi
      envoyService:
        externalTrafficPolicy: Cluster
  shutdown:
    drainTimeout: 180s
  # telemetry.metrics.prometheus.compression removed 2026-04-08 — Envoy
  # Gateway v1.3.0 generates a Gzip compression block without the
  # `override` subfield required by envoy:distroless-v1.33.x. Result:
  # the proxy fails to start with "Proto constraint validation failed
  # (field: 'override', reason: is required)" and the rolling update
  # gets stuck with zombie pods on the failed RS while the working
  # pods on the previous RS keep serving traffic. Re-enable when
  # bumping envoy-gateway to a version that emits the proper config.
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: envoy
    namespace: network
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: envoy-external
  annotations:
    external-dns.alpha.kubernetes.io/target: external.${SECRET_DOMAIN}
spec:
  gatewayClassName: envoy
  # Do NOT set spec.addresses on a LoadBalancer-typed Gateway: envoy-gateway v1.3.0
  # mirrors that into Service.spec.externalIPs, which collides with the IP that
  # Cilium LB IPAM puts in Service.status.loadBalancer.ingress (via lbipam.cilium.io/ips).
  # The collision triggers `frontend already owned by another service` in cilium-agent
  # and silently disables L2 announcement → ARP incomplete on the LB IP → LAN clients
  # cannot reach Envoy. Fixed 2026-05-02 by reverting PR #69.
  infrastructure:
    annotations:
      external-dns.alpha.kubernetes.io/hostname: external.${SECRET_DOMAIN}
      lbipam.cilium.io/ips: "${ENVOY_EXTERNAL_LB_IP}"
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      protocol: HTTPS
      port: 443
      allowedRoutes:
        namespaces:
          from: All
      tls:
        certificateRefs:
          - kind: Secret
            name: ${SECRET_DOMAIN/./-}-production-tls
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: envoy-internal
  annotations:
    external-dns.alpha.kubernetes.io/target: internal.${SECRET_DOMAIN}
spec:
  gatewayClassName: envoy
  # See envoy-external above: spec.addresses on a LoadBalancer Gateway breaks
  # Cilium L2 announcement. Rely on lbipam.cilium.io/ips + auto-status only.
  infrastructure:
    annotations:
      external-dns.alpha.kubernetes.io/hostname: internal.${SECRET_DOMAIN}
      lbipam.cilium.io/ips: "${ENVOY_INTERNAL_LB_IP}"
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      protocol: HTTPS
      port: 443
      allowedRoutes:
        namespaces:
          from: All
      tls:
        certificateRefs:
          - kind: Secret
            name: ${SECRET_DOMAIN/./-}-production-tls
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: https-redirect
  annotations:
    external-dns.alpha.kubernetes.io/controller: none
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: http
    - name: envoy-internal
      namespace: network
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301

---
# yaml-language-server: $schema=https://schemas.zinn.ca/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
spec:
  chartRef:
    kind: OCIRepository
    name: envoy-gateway
  interval: 30m
  values:
    config:
      envoyGateway:
        extensionApis:
          # Required to allow EnvoyPatchPolicy resources to be applied.
          # Used for Alt-Svc: clear injection (ERR_QUIC_PROTOCOL_ERROR fix).
          enableEnvoyPatchPolicy: true
        provider:
          type: Kubernetes
          kubernetes:
            deploy:
              type: GatewayNamespace

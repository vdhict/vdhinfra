---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cilium
spec:
  targetNamespace: kube-system
  path: ./kubernetes/main/apps/kube-system/cilium/app
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  prune: false
  interval: 30m
  timeout: 5m
  wait: true

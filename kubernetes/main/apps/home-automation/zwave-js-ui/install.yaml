---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app zwave-js-ui
  namespace: flux-system
spec:
  targetNamespace: home-automation
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: rook-ceph-cluster
    - name: volsync
  path: ./kubernetes/main/apps/home-automation/zwave-js-ui/app
  postBuild:
    substitute:
      APP: zwave-js-ui
      # StatefulSet PVC has the -0 ordinal suffix
      VOLSYNC_CLAIM: config-zwave-js-ui-0
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  prune: true
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 5m

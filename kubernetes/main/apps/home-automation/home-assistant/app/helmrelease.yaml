---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app home-assistant
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  values:
    controllers:
      home-assistant:
        initContainers:
          init-db:
            image:
              repository: ghcr.io/onedr0p/postgres-init
              tag: 16
            envFrom: &envFrom
              - secretRef:
                  name: home-assistant-secret
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/home-assistant
              tag: 2026.3.1@sha256:067e54e2e107892a584936f064147f8bf47c0120eed34e272cf6eb6c8520b0de
            env:
              HASS_EXTERNAL_URL: https://hass.${SECRET_DOMAIN}
              HASS_PURGE_KEEP_DAYS: 30
              HASS_UNIT_SYSTEM: metric
              TZ: "Europe/Amsterdam"
              POSTGRES_HOST:
              POSTGRES_DB: home_assistant
              HASS_HTTP_TRUSTED_PROXY_1: 10.43.0.0/16
              HASS_HTTP_TRUSTED_PROXY_2: 172.16.2.0/23
              HASS_HTTP_TRUSTED_PROXY_3: 192.168.12.0/24
            envFrom: *envFrom
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 5Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
          code-server:
            image:
              repository: ghcr.io/coder/code-server
              tag: 4.114.0@sha256:14e279b1e741d58d99b8afb1b24fa6cb0a433a3edf58bf271720e4d4ace225af
            args:
              [
                "--auth", "none",
                "--user-data-dir", "/config/.vscode",
                "--extensions-dir", "/config/.vscode",
                "--port", "12321",
                "/config",
              ]
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 5Gi

    defaultPodOptions:
      hostNetwork: true
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
        fsGroupChangePolicy: OnRootMismatch

    route:
      main:
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        hostnames:
          - hass.${SECRET_DOMAIN}
        rules:
          - backendRefs:
              - name: home-assistant
                port: 8123
      code-server:
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        hostnames:
          - hass-code.${SECRET_DOMAIN}
        rules:
          - backendRefs:
              - name: home-assistant
                port: 12321

    persistence:
      config:
        type: persistentVolumeClaim
        storageClass: rook-ceph-block
        accessMode: ReadWriteOnce
        size: 75Gi
        globalMounts:
          - path: /config
      tmp:
        type: emptyDir
      homedir:
        type: persistentVolumeClaim
        storageClass: rook-ceph-block
        accessMode: ReadWriteOnce
        size: 10Gi
        globalMounts:
          - path: /root

    service:
      app:
        controller: *app
        annotations:
          lbipam.cilium.io/ips: "172.16.2.237"
        type: LoadBalancer
        externalTrafficPolicy: Cluster
        ports:
          http:
            port: 8123
          code-server:
            port: 12321

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name tesla-http-proxy
spec:
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: tesla-http-proxy-secret
    template:
      engineVersion: v2
      data:
        # ECDSA P-256 private key. tesla-http-proxy uses this to sign
        # vehicle-command requests; the matching public key is registered
        # to the car as a virtual key.
        fleet-key.pem: "{{ .TESLA_FLEET_KEY }}"
  dataFrom:
    - extract:
        key: Tesla

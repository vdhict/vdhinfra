---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name evcc
spec:
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: evcc-secret
    template:
      engineVersion: v2
      data:
        evcc.yaml: |
          network:
            schema: http
            host: 0.0.0.0
            port: 7070

          interval: 30s
          log: info

          database:
            type: sqlite
            dsn: /data/evcc.db

          mqtt:
            broker: mosquitto.home-automation.svc.cluster.local:1883
            user: {{ .MOSQUITTO_MQTT_USERNAME }}
            password: {{ .MOSQUITTO_MQTT_PASSWORD }}
            topic: evcc

          site:
            title: VDH Home
            meters:
              grid: grid
              pv:
                - pv

          meters:
            # Grid: HomeWizard P1 meter direct over LAN. No HA round-trip.
            # Provides power, energy, phase currents + voltages.
            # IP must have a DHCP reservation in UDM (currently 172.16.3.178).
            - name: grid
              type: template
              template: homewizard
              usage: grid
              host: 172.16.3.178

            # PV: Growatt 4000TL is read by the standalone solar-monitor pi
            # and only published to HA, so we pull it via HA REST API.
            # The evcc 'homeassistant' meter template uses an interactive
            # OAuth flow via the UI hamburger menu — incompatible with
            # GitOps. Using the http plugin with a long-lived token is the
            # declarative path.
            - name: pv
              type: custom
              power:
                source: http
                uri: http://172.16.2.237:8123/api/states/sensor.growatt_4000tl_growatt_4000tl_output_power
                auth:
                  type: bearer
                  token: {{ .HA_TOKEN }}
                jq: .state | tonumber
                cache: 15s
                timeout: 5s
              energy:
                source: http
                uri: http://172.16.2.237:8123/api/states/sensor.growatt_4000tl_growatt_4000tl_pv_energy_total
                auth:
                  type: bearer
                  token: {{ .HA_TOKEN }}
                jq: .state | tonumber
                cache: 60s
                timeout: 5s

          chargers:
            - name: twc3
              type: template
              template: twc3
              host: 172.16.3.61

          # Phase 1: no Tesla vehicle / command proxy yet — loadpoint runs in
          # monitor mode (mode: off). The wallbox keeps charging at whatever
          # the Tesla app commands; evcc records statistics but does not
          # control amps. Switch to "pv" or "minpv" in phase 2 once the Tesla
          # command proxy is deployed and the vehicle is configured.
          loadpoints:
            - title: Garage
              charger: twc3
              mode: "off"
              phases: 3
              mincurrent: 6
              maxcurrent: 16

          tariffs:
            currency: EUR
            grid:
              type: template
              template: epexprijzen-nl
              provider: zonneplan
              price-interval: hourly
  dataFrom:
    - extract:
        key: mosquitto
    - extract:
        key: evcc

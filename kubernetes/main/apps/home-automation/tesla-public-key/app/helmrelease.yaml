# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app tesla-public-key
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false
  values:
    # Single-purpose static-file webserver. Serves exactly one file:
    #   /.well-known/appspecific/com.tesla.3p.public-key.pem
    # Tesla's partner-registration validator and the Tesla mobile app
    # (during virtual-key pairing) fetch this URL to learn the public
    # half of the keypair we use to sign vehicle commands. The public
    # key is meant to be public — it is pulled from 1Password only to
    # keep both halves of the keypair in one place.
    controllers:
      tesla-public-key:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/nginxinc/nginx-unprivileged
              tag: 1.27-alpine
            env:
              TZ: Europe/Amsterdam
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /.well-known/appspecific/com.tesla.3p.public-key.pem
                    port: &port 8080
                  initialDelaySeconds: 5
                  periodSeconds: 30
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /.well-known/appspecific/com.tesla.3p.public-key.pem
                    port: *port
                  initialDelaySeconds: 2
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              startup:
                enabled: false
            resources:
              requests:
                cpu: 5m
                memory: 16Mi
              limits:
                memory: 32Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }

    service:
      app:
        controller: *app
        ports:
          http:
            port: *port

    route:
      main:
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        hostnames:
          - "tesla.${SECRET_DOMAIN}"
        rules:
          - matches:
              - path:
                  type: Exact
                  value: /.well-known/appspecific/com.tesla.3p.public-key.pem
            backendRefs:
              - name: tesla-public-key
                port: *port

    persistence:
      pubkey:
        type: secret
        name: tesla-public-key-secret
        advancedMounts:
          tesla-public-key:
            app:
              - path: /usr/share/nginx/html/.well-known/appspecific/com.tesla.3p.public-key.pem
                subPath: com.tesla.3p.public-key.pem
                readOnly: true
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
      nginx-cache:
        type: emptyDir
        globalMounts:
          - path: /var/cache/nginx
      nginx-pid:
        type: emptyDir
        globalMounts:
          - path: /var/run

---
apiVersion: nfd.k8s-sigs.io/v1alpha1
kind: NodeFeatureRule
metadata:
  name: aeotec-zwave-device
spec:
  rules:
    - name: aeotec.zwave
      labels:
        aeotec.feature.node.kubernetes.io/zwave: "true"
      matchFeatures:
        - feature: usb.device
          matchExpressions:
            vendor:
              op: In
              value: ["0658"]
            device:
              op: In
              value: ["0200"]
            class:
              op: In
              value: ["02"]

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudnative-pg
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: cloudnative-pg-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      metadata:
        labels:
          cnpg.io/reload: "true"
  data:
    - secretKey: username
      remoteRef:
        key: cloudnative-pg
        property: POSTGRES_SUPER_USER
    - secretKey: password
      remoteRef:
        key: cloudnative-pg
        property: POSTGRES_SUPER_PASS
---
# MinIO root creds, mapped to AWS S3 client env names so the CNPG
# barman backend can use them as-is. Reuses the existing 1P "minio"
# item; no new fields needed.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-backup
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: cnpg-backup-secret
    creationPolicy: Owner
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: minio
        property: MINIO_ROOT_USER
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: minio
        property: MINIO_ROOT_PASSWORD

[settings]
pipx_uvx = true

[env]
SOPS_AGE_KEY_FILE = "{{config_root}}/age.key"

[tools]
# Cluster management
"aqua:budimanjojo/talhelper" = "3.1.10"
"aqua:siderolabs/talos" = "1.13.2"
"aqua:kubernetes/kubernetes/kubectl" = "1.36.1"
"aqua:fluxcd/flux2" = "2.8.7"
"aqua:helm/helm" = "4.2.0"
"aqua:helmfile/helmfile" = "1.5.1"
"aqua:kubernetes-sigs/kustomize" = "5.7.1"

# Networking
"aqua:cilium/cilium-cli" = "0.19.2"
cilium-hubble = "latest"

# Secrets & encryption
"aqua:FiloSottile/age" = "1.3.1"
"aqua:getsops/sops" = "3.13.0"

# CLI utilities
"aqua:casey/just" = "1.51.0"
"aqua:charmbracelet/gum" = "0.17.0"
"aqua:cli/cli" = "2.92.0"
"aqua:jqlang/jq" = "1.8.1"
"aqua:mikefarah/yq" = "4.53.2"

# Validation & linting
"aqua:yannh/kubeconform" = "0.7.0"
"pipx:flux-local" = "latest"

# Cloudflare
"aqua:cloudflare/cloudflared" = "2026.5.0"

# Python tooling (for flux-local)
"aqua:astral-sh/uv" = "latest"

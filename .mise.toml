[settings]
pipx_uvx = true

[env]
SOPS_AGE_KEY_FILE = "{{config_root}}/age.key"

[tools]
# Cluster management
"aqua:budimanjojo/talhelper" = "3.1.11"
"aqua:siderolabs/talos" = "1.13.5"
"aqua:kubernetes/kubernetes/kubectl" = "1.36.2"
"aqua:fluxcd/flux2" = "2.8.8"
"aqua:helm/helm" = "4.2.2"
"aqua:helmfile/helmfile" = "1.6.0"
"aqua:kubernetes-sigs/kustomize" = "5.7.1"

# Networking
"aqua:cilium/cilium-cli" = "0.19.2"
# renovate: datasource=github-releases depName=cilium/hubble
cilium-hubble = "1.19.3"

# Secrets & encryption
"aqua:FiloSottile/age" = "1.3.1"
"aqua:getsops/sops" = "3.13.1"

# CLI utilities
"aqua:casey/just" = "1.54.0"
"aqua:charmbracelet/gum" = "0.17.0"
"aqua:cli/cli" = "2.95.0"
"aqua:jqlang/jq" = "1.8.1"
"aqua:mikefarah/yq" = "4.53.3"

# Validation & linting
"aqua:yannh/kubeconform" = "0.7.0"
"pipx:flux-local" = "latest"

# Cloudflare
"aqua:cloudflare/cloudflared" = "2026.6.1"

# Python tooling (for flux-local)
"aqua:astral-sh/uv" = "latest"
yamllint = "latest"
